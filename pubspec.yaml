name: afriyuan_mobile
description: "AfriYuan - International Money Transfer Africa to China"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # ── HTTP & API ─────────────────────────────────────────────────────────────
  dio: ^5.7.0
  retrofit: ^4.4.1
  pretty_dio_logger: ^1.4.0

  # ── State Management ───────────────────────────────────────────────────────
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.4.0

  # ── Navigation ─────────────────────────────────────────────────────────────
  go_router: ^14.8.1

  # ── Local Storage ──────────────────────────────────────────────────────────
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3
  # ── Stripe Payment ─────────────────────────────────────────────────────────
  flutter_stripe: ^11.3.0

  # ── Firebase ───────────────────────────────────────────────────────────────
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5
  firebase_analytics: ^11.3.5

  # ── Biometric Auth ─────────────────────────────────────────────────────────
  local_auth: ^2.3.0

  # ── UI Components ──────────────────────────────────────────────────────────
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  lottie: ^3.3.1
  pinput: ^5.0.1
  country_picker: ^2.0.26
  intl: ^0.20.2
  fl_chart: ^0.69.0
  toastification: ^2.2.0

  # ── Image & File ───────────────────────────────────────────────────────────
  image_picker: ^1.1.2
  file_picker: ^8.1.4
  permission_handler: ^11.3.1

  # ── Utils ──────────────────────────────────────────────────────────────────
  equatable: ^2.0.7
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  logger: ^2.5.0
  url_launcher: ^6.3.1
  share_plus: ^10.1.3
  connectivity_plus: ^6.1.1
  package_info_plus: ^8.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  retrofit_generator: ^9.1.7
  riverpod_generator: ^2.4.0
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  mockito: ^5.4.4


flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/flags/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
